name: Cursor Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  cursor-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run Cursor review
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          agent --version

          {
            echo "Please review this pull request."
            echo
            echo "Focus on correctness bugs, security risks, performance regressions, missing tests, and risky edge cases."
            echo "Be concise. Report only actionable findings. If there are no major issues, say so clearly."
            echo
            echo "PR diff stat:"
            git diff --stat "$BASE_SHA...$HEAD_SHA" || true
            echo
            echo "PR diff:"
            git diff "$BASE_SHA...$HEAD_SHA" || true
          } > /tmp/cursor_review_prompt.txt

          agent -p --trust --model auto --output-format text "$(cat /tmp/cursor_review_prompt.txt)" > cursor_review.md

      - name: Comment review result on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.existsSync('cursor_review.md')
              ? fs.readFileSync('cursor_review.md', 'utf8')
              : 'Cursor review produced no output.';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Cursor Review\n\n${body}`
            });
