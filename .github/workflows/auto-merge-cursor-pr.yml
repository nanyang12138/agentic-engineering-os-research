name: auto-merge-cursor-pr

on:
  workflow_run:
    workflows: ["validate"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Find pull request for validated branch
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          echo "Validated branch: ${HEAD_BRANCH}"

          PR_JSON=$(gh pr list \
            --repo "${REPO}" \
            --state open \
            --head "${HEAD_BRANCH}" \
            --json number,isDraft,author,headRefName,url \
            --limit 20)

          echo "${PR_JSON}"

          PR_NUMBER=$(echo "${PR_JSON}" | jq -r '
            .[]
            | select(.author.login == "cursor[bot]" or .author.login == "nanyang12138")
            | .number
          ' | head -n 1)

          if [ -z "${PR_NUMBER}" ] || [ "${PR_NUMBER}" = "null" ]; then
            echo "No open Cursor/user PR found for branch ${HEAD_BRANCH}."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          IS_DRAFT=$(echo "${PR_JSON}" | jq -r ".[] | select(.number == ${PR_NUMBER}) | .isDraft")
          PR_URL=$(echo "${PR_JSON}" | jq -r ".[] | select(.number == ${PR_NUMBER}) | .url")

          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "is_draft=${IS_DRAFT}" >> "$GITHUB_OUTPUT"
          echo "url=${PR_URL}" >> "$GITHUB_OUTPUT"

      - name: Mark draft PR ready
        if: steps.pr.outputs.found == 'true' && steps.pr.outputs.is_draft == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          gh pr ready "${PR_NUMBER}" --repo "${REPO}"

      - name: Enable squash auto-merge
        if: steps.pr.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          gh pr merge "${PR_NUMBER}" \
            --repo "${REPO}" \
            --auto \
            --squash
