model: gpt-5.5-extra-high
language: zh-CN
review_focus:
  - correctness
  - security
  - performance
  - tests
  - edge-cases
max_findings: 5
max_diff_bytes: 120000
filter_mode: added
persistent_comment: true
enabled_commands:
  - review
  - ask
  - improve
  - describe
include_patterns: []
exclude_patterns:
  - "*.lock"
  - "dist/**"
  - "build/**"
